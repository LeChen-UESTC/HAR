base_config: ntu60_zsl.yaml

experiment:
  tags: ["ntu60", "generative", "stepwise", "irr"]

train:
  stage: skeleton_gircse
  epochs: 20
  batch_size: 8
  lr_projector: 0.0001
  lr_shift_gcn: 0.00001
  freeze_llm: true
  freeze_lm_head: true
  eval_during_train: false
  eval_freq: 1

loss:
  type: stepwise_infonce_irr
  temperature: 0.05
  lambda_irr: 1.0
